name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every hour
  workflow_dispatch:     # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          # This is the crucial step: fetches all history for all branches and tags
          fetch-depth: 0 
          token: ${{ secrets.PAT }} # Using a PAT is recommended

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/sambecker/exif-photo-blog.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Merge Upstream Changes
        run: |
          git checkout main
          # Add --allow-unrelated-histories as a failsafe
          git merge upstream/main
          git push origin main
